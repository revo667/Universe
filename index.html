<!DOCTYPE html>
<html>
  <head>
    <style>
        body {
            background-color: black;
            color:aliceblue;
            margin: 0;
            overflow: hidden;
        }

        #chatInput {
            position: absolute;
            background: transparent;
            border: none;
            outline: none;
            font-size: 12px;
            padding: 0;
            z-index: 10;
        }

        #chatInput::placeholder {
            color: var(--chat-dim, rgba(167, 139, 196, 0.4));
        }

        #dock {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(10, 8, 14, 0.45);
            border: 1px solid rgba(124, 77, 171, 0.25);
            backdrop-filter: blur(20px);
            z-index: 20;
        }

        .dock-item {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            background: rgba(124, 77, 171, 0.1);
            border: 1px solid transparent;
            transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
            opacity: 0.45;
        }

        .dock-item:hover {
            transform: translateY(-4px);
            background: rgba(124, 77, 171, 0.25);
        }

        .dock-item.open {
            opacity: 1;
            border-color: rgba(124, 77, 171, 0.4);
        }
    </style>
    <title>
        Universe
    </title>
  </head>
  <body>
    <canvas id="space"></canvas>
    <input id="chatInput" type="text" autocomplete="off" placeholder="Mesajınızı yazın..." />
    <div id="dock"></div>
    <script src="node_modules/gsap/dist/gsap.min.js"></script>
    <script type="module" src="src/renderer.js"></script>
  </body>
</html>
